# Smart Money — Hyperliquid → OKX symbol map
#
# HL uses bare coin symbols ("BTC"); OKX perpetuals are quoted as
# "BTC/USDT:USDT" via ccxt. Any HL coin not listed here will be
# skipped at the mapper stage (sm_skipped_signals reason=symbol_unsupported).
#
# `min_notional_usd` = minimum order notional accepted by the mapper/guards
# pipeline. Set conservatively — OKX's absolute minimum varies per instrument
# but $10 is a safe floor.
#
# Curated list — review weekly, update when HL adds a new perp or OKX delists.

