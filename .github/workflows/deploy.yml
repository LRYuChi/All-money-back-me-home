name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允許手動觸發，方便 debug / 補跑

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/ambmh && bash scripts/deploy.sh
