services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build: ./apps/web
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - API_BASE_URL=http://api:8000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build: ./apps/api
    volumes:
      - trade-data:/app/data
      - ./market_monitor:/app/market_monitor
      - ./agent:/app/agent
      - ./guards:/app/guards
      - ./strategies:/app/strategies:ro
      - ./config/freqtrade:/app/config
      # polymarket status.json written by host wrapper — read-only mount
      - ./data/reports:/app/polymarket_status:ro
      # R55: dashboard endpoints (/api/supertrend/*) read the journal that
      # freqtrade writes — must see the same volume the strategy writes to.
      - ./trading_log:/app/trading_log:ro
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - FRED_API_KEY=${FRED_API_KEY}
      - COINGLASS_API_KEY=${COINGLASS_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - INITIAL_CAPITAL=${INITIAL_CAPITAL:-1000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - FT_USER=${FT_USER:-freqtrade}
      - FT_PASS=${FT_PASS:-freqtrade}
      # R55: pin journal location for dashboard endpoints
      - SUPERTREND_JOURNAL_DIR=/app/trading_log/journal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  freqtrade:
    image: freqtradeorg/freqtrade:stable
    entrypoint: ["/bin/sh", "-c"]
    # P1-6 (round 47): SUPERTREND_LIVE env toggle.
    #   SUPERTREND_LIVE=1 → live trading (real money on OKX)
    #   SUPERTREND_LIVE=0 (or unset) → dry_run (paper trading, $1000 sim)
    # Translated to Freqtrade's FREQTRADE__DRY_RUN env var. The bash
    # conditional below handles the "1" → "false" / "0" → "true" mapping.
    # Banner echoed to stdout so `docker logs` shows the mode at startup.
    command:
      - >-
        if [ "$$SUPERTREND_LIVE" = "1" ]; then
          export FREQTRADE__DRY_RUN=false;
          echo '⚠️  SUPERTREND_LIVE=1 → LIVE TRADING (real money)';
        else
          export FREQTRADE__DRY_RUN=true;
          echo '✅ dry_run mode (paper trading $$1000 sim)';
        fi;
        pip install --no-cache-dir smartmoneyconcepts --no-deps -q 2>/dev/null;
        pip install --no-cache-dir yfinance fredapi -q 2>/dev/null;
        # R60: belt-and-suspenders — background a curl /start after API
        # is reachable. Freqtrade ignores config "initial_state" at runtime,
        # so the only reliable autostart path is hitting the REST API.
        # 30s wait + 5min retry budget covers slow container boots.
        ( for i in $$(seq 1 60); do
            sleep 5;
            if curl -sf -u $${FT_USER:-freqtrade}:$${FT_PASS:-freqtrade} \
                http://127.0.0.1:8080/api/v1/show_config 2>/dev/null \
                | grep -q "stopped"; then
                echo "[autostart] bot stopped — issuing /start";
                curl -sf -u $${FT_USER:-freqtrade}:$${FT_PASS:-freqtrade} \
                    -X POST http://127.0.0.1:8080/api/v1/start && break;
            elif curl -sf -u $${FT_USER:-freqtrade}:$${FT_PASS:-freqtrade} \
                http://127.0.0.1:8080/api/v1/show_config 2>/dev/null \
                | grep -q "running"; then
                echo "[autostart] bot already running ($$i ticks)";
                break;
            fi;
          done ) &
        freqtrade trade
        --strategy SupertrendStrategy
        -c /freqtrade/config/config_dry.json
        -c /freqtrade/config/config_secrets.json
        -c /freqtrade/config/config_telegram.json
        --strategy-path /freqtrade/user_data/strategies
    volumes:
      - ./strategies:/freqtrade/user_data/strategies
      - ./indicators:/freqtrade/user_data/strategies/indicators
      - ./market_monitor:/freqtrade/user_data/strategies/market_monitor
      - ./guards:/freqtrade/user_data/strategies/guards
      - ./agent:/freqtrade/user_data/strategies/agent
      - ./config/freqtrade:/freqtrade/config
      - ft-data:/freqtrade/user_data/data
      - trade-data:/freqtrade/user_data/shared_data
      # Round 46: SupertrendStrategy writes structured journal here.
      # Mounted to host so `python -m strategies.cli.journal_report`
      # on the host can read it without entering the container.
      - ./trading_log:/freqtrade/trading_log
    environment:
      - DATA_DIR=/freqtrade/user_data/shared_data
      - FRED_API_KEY=${FRED_API_KEY}
      - COINGLASS_API_KEY=${COINGLASS_API_KEY}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      # Freqtrade 2024+ 支援 FREQTRADE__<SECTION>__<KEY> 形式 env vars
      # 覆蓋 config_telegram.json 的空 token/chat_id
      # 與 ambmh telegram-bot 共用同一個 bot（訊息會混在同一對話）
      - FREQTRADE__TELEGRAM__ENABLED=true
      - FREQTRADE__TELEGRAM__TOKEN=${TELEGRAM_TOKEN}
      - FREQTRADE__TELEGRAM__CHAT_ID=${TELEGRAM_CHAT_ID}
      # ============================================================
      # SUPERTREND_* switchboard — all R47–R58 escape hatches.
      # Defaults are SAFE (= existing behavior). Operators flip these in .env
      # to opt into new alpha sources or change sizing modes. Each is
      # independently togglable and reverts to the legacy path when unset.
      # ============================================================
      # P1-6 (R47): live mode switch — 1 = real money, 0 = dry_run paper trading
      - SUPERTREND_LIVE=${SUPERTREND_LIVE:-0}
      # R48: market regime gate (BTC ATR/ADX/Hurst → TRENDING/CHOPPY/DEAD).
      #   1 = active (default; sizes down in CHOPPY, blocks in DEAD)
      #   0 = bypass entirely (legacy behavior, no regime context)
      - SUPERTREND_REGIME_FILTER=${SUPERTREND_REGIME_FILTER:-1}
      # R49: Kelly fraction mode for tag-conditioned sizing.
      #   three_stage  = pre_scout/scout/confirmed → 0.25/0.50/0.85 (default, recommended)
      #   continuous   = kelly × quality × |dir_score| × adx_norm (smoothest, most aggressive)
      #   binary       = legacy 0.25/0.75 only (use to A/B revert)
      - SUPERTREND_KELLY_MODE=${SUPERTREND_KELLY_MODE:-three_stage}
      # R50: exit policy — weighted multi-signal score vs single-tf flip.
      #   weighted = 1D/4H/15m/ADX scored, full-exit ≥ 0.75 / partial 0.50–0.75 (default)
      #   legacy   = original single-tf flip (kept for emergency revert)
      - SUPERTREND_EXIT_MODE=${SUPERTREND_EXIT_MODE:-weighted}
      # R57: funding-rate contra-signal entry filter (NEW — default OFF).
      #   1 = block entries when |FR strength| ≥ 0.5 opposing intended side
      #   0 = ignore funding rate at entry time (existing behavior)
      - SUPERTREND_FR_ALPHA=${SUPERTREND_FR_ALPHA:-0}
      # R57: orderbook microstructure entry confirm (NEW — default OFF).
      #   1 = fetch dp.orderbook(maximum=10), abort entry on strong contra-imbalance
      #   0 = skip the REST call, no orderbook gate
      - SUPERTREND_ORDERBOOK_CONFIRM=${SUPERTREND_ORDERBOOK_CONFIRM:-0}
      # R58: correlation cluster + rotation sizing (NEW — default OFF).
      #   1 = block when n_open≥2 + mean ρ≥0.85; apply BTC/alt rotation multiplier
      #   0 = no correlation gate, all stakes flat (existing behavior)
      - SUPERTREND_CORRELATION_FILTER=${SUPERTREND_CORRELATION_FILTER:-0}
      # Journal location — kept on host volume so dashboard/cron sidecar can read it
      - SUPERTREND_JOURNAL_DIR=${SUPERTREND_JOURNAL_DIR:-/freqtrade/trading_log/journal}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    ports:
      - "127.0.0.1:8080:8080"  # Localhost only — not exposed to internet
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v1/ping || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  telegram-bot:
    build: ./apps/api
    command: python -m market_monitor.telegram_bot
    depends_on:
      - freqtrade
    volumes:
      - trade-data:/app/data
      - ./market_monitor:/app/market_monitor
      - ./agent:/app/agent
      - ./guards:/app/guards
      - ./polymarket:/app/polymarket
    environment:
      - TG_AI_BOT_TOKEN=${TG_AI_BOT_TOKEN}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - CRYPTOPANIC_API_KEY=${CRYPTOPANIC_API_KEY}
      - FT_USER=${FT_USER:-freqtrade}
      - FT_PASS=${FT_PASS:-freqtrade}
      - DATA_DIR=/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('https://api.telegram.org', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------------
  # Supertrend cron sidecar (R56): long-running scheduler that fires
  # daily summary (00:05 UTC), weekly review (Mon 00:30 UTC), and
  # 6h regime check (00/06/12/18 UTC). Reads journal via shared volume.
  # State persisted at /app/data/cron_state.json so restarts within the
  # same minute don't double-fire jobs.
  # ----------------------------------------------------------------
  supertrend-cron:
    build: ./apps/api
    command: python -u -m strategies.cli.cron_sidecar
    depends_on:
      - freqtrade
    volumes:
      - ./strategies:/app/strategies:ro
      - ./market_monitor:/app/market_monitor:ro
      - ./guards:/app/guards:ro
      - ./trading_log:/app/trading_log
      - trade-data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - SUPERTREND_JOURNAL_DIR=/app/trading_log/journal
      - CRON_STATE_FILE=/app/data/cron_state.json
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - TG_AI_BOT_TOKEN=${TG_AI_BOT_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  smart-money:
    build: ./apps/smart-money
    command: ["sleep", "infinity"]
    volumes:
      - ./smart_money:/app/smart_money:ro
      - ./data:/app/data:rw
    environment:
      - DATABASE_URL=${SM_DATABASE_URL:-}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - HL_API_URL=${HL_API_URL:-https://api.hyperliquid.xyz}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------------
  # Shadow daemon (P4c): subscribe HL userFills for whitelisted whales,
  # classify signals, aggregate, write paper trades to sm_paper_trades.
  # Separate service from one-shot smart-money above so it can be
  # restarted/scaled independently.
  # ----------------------------------------------------------------
  smart-money-shadow:
    build: ./apps/smart-money
    command: >
      python -u -m smart_money.cli.shadow
      --aggregation-mode ${SM_SHADOW_AGGREGATION_MODE:-aggregated}
      --aggregation-window-sec ${SM_SHADOW_AGGREGATION_WINDOW_SEC:-300}
      --min-wallets-for-signal ${SM_SHADOW_MIN_WALLETS:-2}
      --whitelist-size ${SM_SHADOW_WHITELIST_SIZE:-30}
      --freshness-days ${SM_SHADOW_FRESHNESS_DAYS:-7}
      --warmup-hours ${SM_SHADOW_WARMUP_HOURS:-48}
      --reconciler-interval ${SM_SHADOW_RECONCILER_INTERVAL:-30}
      --reconciler-lookback ${SM_SHADOW_RECONCILER_LOOKBACK:-300}
      --symbol-map /app/config/smart_money/symbol_map.yaml
      --whitelist /app/config/smart_money/whitelist_manual.yaml
      --log-level ${SM_SHADOW_LOG_LEVEL:-INFO}
    volumes:
      - ./smart_money:/app/smart_money:ro
      - ./config/smart_money:/app/config/smart_money:ro
      # Shadow daemon imports from these packages (rounds 14+); they must be
      # mounted alongside smart_money/ for `import fusion`, `import execution`,
      # `import shared`, `import strategy_engine` to resolve.
      - ./fusion:/app/fusion:ro
      - ./execution:/app/execution:ro
      - ./shared:/app/shared:ro
      - ./strategy_engine:/app/strategy_engine:ro
      - ./risk:/app/risk:ro
      - ./config/fusion:/app/config/fusion:ro
      - ./config/strategies:/app/config/strategies:ro
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${SM_DATABASE_URL:-}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SM_HL_API_URL=${HL_API_URL:-https://api.hyperliquid.xyz}
      # Round 7 + 34: master key for credential store decrypt (OKX keys etc.)
      - MASTER_SECRET=${MASTER_SECRET:-}
      - MASTER_SECRET_OLD=${MASTER_SECRET_OLD:-}
      # Shadow daemon needs a wide stop timeout so it can flush the queue,
      # unsubscribe cleanly, and close its WS connection.
    stop_grace_period: 30s
    restart: unless-stopped
    # No HTTP healthcheck yet (daemon has no HTTP surface in P4). The supervisor
    # loop logs "Bot heartbeat" equivalents; `docker logs` is the ground truth.
    # P5 will add a signal-health endpoint for proper healthcheck.
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  trade-data:
  ft-data:
