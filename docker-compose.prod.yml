services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build: ./apps/web
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - API_BASE_URL=http://api:8000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build: ./apps/api
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - FRED_API_KEY=${FRED_API_KEY}
      - COINGLASS_API_KEY=${COINGLASS_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - INITIAL_CAPITAL=${INITIAL_CAPITAL:-1000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - FT_USER=${FT_USER:-freqtrade}
      - FT_PASS=${FT_PASS:-freqtrade}
    volumes:
      - trade-data:/app/data
      - ./market_monitor:/app/market_monitor
      - ./agent:/app/agent
      - ./guards:/app/guards
      - ./config/freqtrade:/app/config
      # polymarket status.json written by host wrapper — read-only mount
      - ./data/reports:/app/polymarket_status:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  freqtrade:
    image: freqtradeorg/freqtrade:stable
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "pip install --no-cache-dir smartmoneyconcepts --no-deps -q 2>/dev/null; pip install --no-cache-dir yfinance fredapi -q 2>/dev/null; freqtrade trade --strategy SupertrendStrategy -c /freqtrade/config/config_dry.json -c /freqtrade/config/config_secrets.json -c /freqtrade/config/config_telegram.json --strategy-path /freqtrade/user_data/strategies"
    volumes:
      - ./strategies:/freqtrade/user_data/strategies
      - ./indicators:/freqtrade/user_data/strategies/indicators
      - ./market_monitor:/freqtrade/user_data/strategies/market_monitor
      - ./guards:/freqtrade/user_data/strategies/guards
      - ./agent:/freqtrade/user_data/strategies/agent
      - ./config/freqtrade:/freqtrade/config
      - ft-data:/freqtrade/user_data/data
      - trade-data:/freqtrade/user_data/shared_data
    environment:
      - DATA_DIR=/freqtrade/user_data/shared_data
      - FRED_API_KEY=${FRED_API_KEY}
      - COINGLASS_API_KEY=${COINGLASS_API_KEY}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      # Freqtrade 2024+ 支援 FREQTRADE__<SECTION>__<KEY> 形式 env vars
      # 覆蓋 config_telegram.json 的空 token/chat_id
      # 與 ambmh telegram-bot 共用同一個 bot（訊息會混在同一對話）
      - FREQTRADE__TELEGRAM__ENABLED=true
      - FREQTRADE__TELEGRAM__TOKEN=${TELEGRAM_TOKEN}
      - FREQTRADE__TELEGRAM__CHAT_ID=${TELEGRAM_CHAT_ID}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    ports:
      - "127.0.0.1:8080:8080"  # Localhost only — not exposed to internet
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v1/ping || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  telegram-bot:
    build: ./apps/api
    command: python -m market_monitor.telegram_bot
    depends_on:
      - freqtrade
    volumes:
      - trade-data:/app/data
      - ./market_monitor:/app/market_monitor
      - ./agent:/app/agent
      - ./guards:/app/guards
      - ./polymarket:/app/polymarket
    environment:
      - TG_AI_BOT_TOKEN=${TG_AI_BOT_TOKEN}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - CRYPTOPANIC_API_KEY=${CRYPTOPANIC_API_KEY}
      - FT_USER=${FT_USER:-freqtrade}
      - FT_PASS=${FT_PASS:-freqtrade}
      - DATA_DIR=/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('https://api.telegram.org', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  smart-money:
    build: ./apps/smart-money
    command: ["sleep", "infinity"]
    volumes:
      - ./smart_money:/app/smart_money:ro
      - ./data:/app/data:rw
    environment:
      - DATABASE_URL=${SM_DATABASE_URL:-}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - HL_API_URL=${HL_API_URL:-https://api.hyperliquid.xyz}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  trade-data:
  ft-data:
