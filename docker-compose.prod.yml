services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build: ./apps/web
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - API_BASE_URL=http://api:8000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build: ./apps/api
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - FRED_API_KEY=${FRED_API_KEY}
      - COINGLASS_API_KEY=${COINGLASS_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - INITIAL_CAPITAL=${INITIAL_CAPITAL:-300}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - trade-data:/app/data
      - ./market_monitor:/app/market_monitor
      - ./agent:/app/agent
      - ./guards:/app/guards
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  freqtrade:
    image: freqtradeorg/freqtrade:stable
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "pip install --no-cache-dir smartmoneyconcepts --no-deps -q 2>/dev/null; pip install --no-cache-dir yfinance fredapi -q 2>/dev/null; freqtrade trade --strategy SMCTrend -c /freqtrade/config/config_dry.json -c /freqtrade/config/config_secrets.json -c /freqtrade/config/config_telegram.json --strategy-path /freqtrade/user_data/strategies"
    volumes:
      - ./strategies:/freqtrade/user_data/strategies
      - ./indicators:/freqtrade/user_data/strategies/indicators
      - ./market_monitor:/freqtrade/user_data/strategies/market_monitor
      - ./guards:/freqtrade/user_data/strategies/guards
      - ./agent:/freqtrade/user_data/strategies/agent
      - ./config/freqtrade:/freqtrade/config
      - ft-data:/freqtrade/user_data/data
      - trade-data:/freqtrade/user_data/shared_data
    environment:
      - DATA_DIR=/freqtrade/user_data/shared_data
      - FRED_API_KEY=${FRED_API_KEY}
      - COINGLASS_API_KEY=${COINGLASS_API_KEY}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    ports:
      - "127.0.0.1:8080:8080"  # Localhost only — not exposed to internet
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  telegram-bot:
    build: ./apps/api
    command: python -m market_monitor.telegram_bot
    depends_on:
      - freqtrade
    volumes:
      - trade-data:/app/data
      - ./market_monitor:/app/market_monitor
      - ./agent:/app/agent
      - ./guards:/app/guards
    environment:
      - TG_AI_BOT_TOKEN=${TG_AI_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - DATA_DIR=/app/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  trade-data:
  ft-data:
